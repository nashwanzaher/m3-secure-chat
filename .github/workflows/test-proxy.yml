name: Test proxy (pytest)

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - '.github/workflows/test-proxy.yml'
  pull_request:
    paths:
      - 'proxy/**'

jobs:
  pytest:
    name: Proxy tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: proxy/requirements*.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        env:
          M3_API_KEY: sk-test-master
          M3_BASE_URL: https://upstream.test
          ALLOWED_ORIGINS: https://app.test
        run: |
          pytest --cov=main --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-coverage
          path: proxy/coverage.xml
          retention-days: 14

  ruff:
    name: Proxy lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff
      - run: ruff check proxy/
      - run: ruff format --check proxy/
