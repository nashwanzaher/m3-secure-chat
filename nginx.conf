# nginx.conf
# Minimal, security-hardened config for serving the SPA.
# - SPA fallback to index.html (so client-side routes work on hard refresh)
# - Aggressive caching for hashed assets
# - Sensible security headers (CSP is intentionally permissive enough to
#   allow the proxy to be called cross-origin during local dev)

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Long cache for hashed assets
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico|webp|avif|jpg|jpeg|png|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide server version
    server_tokens off;

    # Per-request body size cap (defence in depth)
    client_max_body_size 1m;
}
